<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between">
    <button class="btn btn-primary" (click)="create()" *ngIf="!userReview">
      Добавить отзыв
    </button>

    <div *ngIf="userReview && (role === 'USER')">
      <button class="btn btn-danger float-end mx-2 mb-2" type="button" title="Удалить"
        (click)="delete(userReview)">
        <i class="fa-regular fa-trash-can"></i>
      </button>
      <button class="btn btn-success float-end mx-2" type="button" title="Изменить" (click)="update(userReview)">
        <i class="fa fa-edit"></i>
      </button>      
    </div>

    <div>
      <a class="nav-link" routerLink="/activities" title="Вернуться">
        <i class="fas fa-sign-out-alt fa-2x"></i>
      </a>
    </div>
  </div>

  <h4 class="text-center my-4">Список отзывов</h4>
  <div class="form-floating mt-3">
    <input #searchBox type="search" class="form-control" placeholder="search" id="floatingInputSearch"
      (keyup)="onSearch(searchBox.value)" />
    <label for="floatingInputSearch">Поиск по активности</label>
  </div>
  <ng-container *ngIf="filteredReviews$ | async as list; else loading">
    <table class="table table-striped table-hover" *ngIf="list.length > 0; else notFound">
      <thead>
        <tr>
          <th>Id</th>
          <th>Id регистрации</th>
          <th>Активность</th>
          <th>Пользователь</th>
          <th>Рейтинг</th>
          <th>Комментарий</th>
          <th *ngIf="role === 'ADMIN'"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let review of list">
          <td>{{ review.id }}</td>
          <td>{{ review.registrationId }}</td>
          <td>{{ review.registrationActivityName }}</td>
          <td>{{ review.userName }}</td>
          <td>{{ review.rating }}</td>
          <td>{{ review.comment }}</td>
          <td *ngIf="role === 'ADMIN'">
            <div class="d-flex flex-column align-items-end">
              <button class="btn btn-success float-end m-1" type="button" title="Изменить" (click)="update(review)">
                <i class="fa fa-edit"></i>
              </button>
              <button class="btn btn-danger float-end m-1" type="button" title="Удалить"
                (click)="delete(review)">
                <i class="fa-regular fa-trash-can"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </ng-container>

  <ng-template #loading>
    <div class="text-center mt-5">
      <div class="spinner-container">
        <mat-progress-spinner mode="indeterminate" diameter="60"></mat-progress-spinner>
      </div>
      <p class="mt-2">Загрузка отзывов...</p>
    </div>
  </ng-template>

  <ng-template #notFound>
    <div class="text-center mt-5 text-danger">
      <i class="fa fa-times-circle fa-3x"></i>
      <p class="mt-3">Отзывы не найдены</p>
    </div>
  </ng-template>
</div>
