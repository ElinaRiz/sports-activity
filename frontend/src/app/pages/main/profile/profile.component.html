<div class="container mt-5">
  <ng-container *ngIf="user$ | async as user; else loading">
    <ng-container *ngIf="user; else notFound">
      <div class="client-card mb-3">
        <header class="jumbotron mb-4">
          <h3>
            <i class="fas fa-user-alt me-3"></i>
            <strong>{{ user.login }}</strong>
          </h3>
        </header>

        <p><strong>ФИО:</strong> {{ user.fullName }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Телефон:</strong> {{ user.phone || '—' }}</p>
        <p><strong>Дата рождения:</strong> {{ user.birthDate | date:'dd.MM.yyyy' }}</p>
        <p><strong>Роль:</strong> {{ user.role }}</p>
        <div>
          <button class="btn btn-success mb-3" (click)="updateUser(user)">
            <i class="fa fa-pencil me-2"></i> Редактировать
          </button>
        </div>
        <div>
          <button class="btn btn-primary mb-3" (click)="updatePassword(user)">
            <i class="fa fa-pencil me-2"></i> Изменить пароль
          </button>
        </div>
      </div>
    </ng-container>
  </ng-container>

  <ng-template #loading>
    <div class="text-center mt-5">
      <div class="spinner-container">
        <mat-progress-spinner mode="indeterminate" diameter="60"></mat-progress-spinner>
      </div>
      <p class="mt-2">Загрузка профиля...</p>
    </div>
  </ng-template>

  <ng-template #notFound>
    <div class="text-center mt-5 text-danger">
      <i class="fa fa-times-circle fa-3x"></i>
      <p class="mt-3">Пользователь не найден</p>
    </div>
  </ng-template>
</div>
