<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between" *ngIf="role === 'ADMIN'">
        <button class="btn btn-primary" (click)="create()">
            Добавить зал
        </button>
    </div>

    <h4 class="text-center my-4">Список залов</h4>
    <div class="form-floating my-3">
        <input #searchBox type="search" class="form-control" placeholder="search" id="floatingInputSearch"
            (keyup)="onSearch(searchBox.value)" />
        <label for="floatingInputSearch">Поиск по названию</label>
    </div>
    <ng-container *ngIf="filteredHalls$ | async as list; else loading">
        <table class="table table-striped table-hover" *ngIf="list.length > 0; else notFound">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Название</th>
                    <th>Номер комнаты</th>
                    <th>Вместимость</th>
                    <th *ngIf="role === 'ADMIN'"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let hall of list">
                    <td>{{ hall.id }}</td>
                    <td>{{ hall.name }}</td>
                    <td>{{ hall.room }}</td>
                    <td>{{ hall.capacity }}</td>
                    <td *ngIf="role === 'ADMIN'">
                        <div class="d-flex flex-column align-items-end">
                            <button class="btn btn-success float-end m-1" type="button" title="Изменить"
                                (click)="update(hall)">
                                <i class="fa fa-edit"></i>
                            </button>
                            <button class="btn btn-danger float-end m-1" type="button" title="Удалить"
                                (click)="delete(hall)">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </ng-container>

    <ng-template #loading>
        <div class="text-center mt-5">
            <div class="spinner-container">
                <mat-progress-spinner mode="indeterminate" diameter="60"></mat-progress-spinner>
            </div>
            <p class="mt-2">Загрузка залов...</p>
        </div>
    </ng-template>

    <ng-template #notFound>
        <div class="text-center mt-5 text-danger">
            <i class="fa fa-times-circle fa-3x"></i>
            <p class="mt-3">Залы не найдены</p>
        </div>
    </ng-template>
</div>
