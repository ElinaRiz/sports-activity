<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between">
        <button class="btn btn-primary" (click)="create()" *ngIf="!userRegistration">
            Добавить регистрацию
        </button>
        <div>
            <a class="nav-link" routerLink="/activities" title="Вернуться">
                <i class="fas fa-sign-out-alt fa-2x"></i>
            </a>
        </div>
    </div>

    <h4 class="text-center my-4">Список регистраций</h4>
    <div class="form-floating my-3">
        <input #searchBox type="search" class="form-control" placeholder="search" id="floatingInputSearch"
            (keyup)="onSearch(searchBox.value)" />
        <label for="floatingInputSearch">
            Поиск по пользователям
        </label>
    </div>
    <ng-container *ngIf="filteredRegistrations$ | async as list; else loading">
        <table class="table table-striped table-hover" *ngIf="list.length > 0; else notFound">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Активность</th>
                    <th>Пользователь</th>
                    <th>Дата регистрации</th>
                    <th>Оплата</th>
                    <th>Посещение</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let reg of list">
                    <td>{{ reg.id }}</td>
                    <td>{{ reg.activityName }}</td>
                    <td>{{ reg.userName }}</td>
                    <td>{{ reg.registrationDate | date: 'short' }}</td>
                    <td>{{ reg.paymentStatus }}</td>
                    <td>{{ reg.attendanceStatus ? 'Да' : 'Нет' }}</td>
                    <td>
                        <div class="d-flex flex-column align-items-end">
                            <button class="btn btn-success float-end m-1" type="button" title="Изменить"
                                (click)="update(reg)" *ngIf="role === 'ADMIN' || role === 'TRAINER'">
                                <i class="fa fa-edit"></i>
                            </button>
                            <button class="btn btn-danger float-end m-1" type="button" title="Удалить"
                                (click)="delete(reg)" *ngIf="role === 'ADMIN'">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </ng-container>

    <ng-template #loading>
        <div class="text-center mt-5">
            <div class="spinner-container">
                <mat-progress-spinner mode="indeterminate" diameter="60"></mat-progress-spinner>
            </div>
            <p class="mt-2">Загрузка регистраций...</p>
        </div>
    </ng-template>

    <ng-template #notFound>
        <div class="text-center mt-5 text-danger">
            <i class="fa fa-times-circle fa-3x"></i>
            <p class="mt-3">Регистрации не найдены</p>
        </div>
    </ng-template>
</div>
